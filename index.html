<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>QR Scanner — Cairo 3A</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;color:#fff;font-family:sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
.hdr{background:linear-gradient(135deg,#120806,#1e1410);border-bottom:2px solid #c0392b;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr h2{font-size:14px;font-weight:700;color:#fff;}
.cbtn{background:#c0392b;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.wrap{flex:1;position:relative;overflow:hidden;background:#000;}
video{width:100%;height:100%;object-fit:cover;display:block;}
canvas{display:none;}
.overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.hole{position:relative;width:min(72vw,260px);height:min(72vw,260px);box-shadow:0 0 0 9999px rgba(0,0,0,0.55);border-radius:8px;margin-bottom:40px;}
.corner{position:absolute;width:28px;height:28px;}
.corner.tl{top:-2px;left:-2px;border-top:3px solid #f1c40f;border-left:3px solid #f1c40f;border-radius:4px 0 0 0;}
.corner.tr{top:-2px;right:-2px;border-top:3px solid #f1c40f;border-right:3px solid #f1c40f;border-radius:0 4px 0 0;}
.corner.bl{bottom:-2px;left:-2px;border-bottom:3px solid #f1c40f;border-left:3px solid #f1c40f;border-radius:0 0 0 4px;}
.corner.br{bottom:-2px;right:-2px;border-bottom:3px solid #f1c40f;border-right:3px solid #f1c40f;border-radius:0 0 4px 0;}
.scanline{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#f1c40f,transparent);animation:sl 2s ease-in-out infinite;}
@keyframes sl{0%{top:4px}50%{top:calc(100% - 6px)}100%{top:4px}}
.tip{position:absolute;bottom:0;left:0;right:0;padding:12px 16px 20px;text-align:center;font-size:13px;color:rgba(255,255,255,.8);background:linear-gradient(transparent,rgba(0,0,0,.85));}
.tip.ok{color:#2ecc71;font-weight:700;}
.tip.err{color:#ff6b5b;line-height:1.6;}
.res{position:absolute;inset:0;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;}
.res.show{display:flex;}
.res-code{font-size:26px;font-weight:700;color:#f1c40f;letter-spacing:3px;font-family:'Courier New',monospace;text-align:center;}
.res-ok{width:88%;padding:15px;background:#1a7a3c;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.res-retry{width:88%;padding:11px;background:transparent;color:#8b96a8;border:1px solid rgba(255,255,255,.15);border-radius:12px;font-size:13px;cursor:pointer;margin-top:2px;}
</style>
</head>
<body>
<div class="hdr">
  <h2>📷 Cairo 3A — مسح QR</h2>
  <button class="cbtn" onclick="closeMe()">✕ إغلاق</button>
</div>
<div class="wrap">
  <video id="v" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="hole">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="scanline"></div>
    </div>
  </div>
  <div class="tip" id="tip">جاري تشغيل الكاميرا...</div>
  <div class="res" id="res">
    <div style="font-size:52px">✅</div>
    <div style="font-size:12px;color:rgba(255,255,255,.5)">تم التعرف على الكود:</div>
    <div class="res-code" id="rcode"></div>
    <button class="res-ok" onclick="confirmCode()">✅ تأكيد وتسجيل</button>
    <button class="res-retry" onclick="retry()">🔄 مسح مرة أخرى</button>
  </div>
</div>
<script>
var stream=null,raf=null,found=null,active=false,buf=[];
var openerOrigin=document.referrer?new URL(document.referrer).origin:'*';

// Get opener URL from query param
var params=new URLSearchParams(window.location.search);
var returnTo=params.get('return')||'';

var tryList=[
  {video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:720}}},
  {video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}},
  {video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}},
  {video:true}
];
var ci=0;

function start(){
  if(ci>=tryList.length){
    setTip('⚠️ تعذّر الوصول للكاميرا\nاضغط على أيقونة 🔒 أو ⓘ في شريط المتصفح\nثم اسمح بالوصول للكاميرا','err');
    return;
  }
  navigator.mediaDevices.getUserMedia(tryList[ci++])
    .then(function(s){
      stream=s;
      var v=document.getElementById('v');
      v.srcObject=s;
      v.play().catch(function(){});
      v.addEventListener('loadeddata',function(){
        setTip('وجّه الكاميرا نحو QR Code','');
        active=true;
        requestAnimationFrame(tick);
      },{once:true});
    })
    .catch(function(){ start(); });
}

function tick(){
  if(!active)return;
  var v=document.getElementById('v'),c=document.getElementById('c');
  if(!v||v.readyState<2||!v.videoWidth){requestAnimationFrame(tick);return;}
  c.width=v.videoWidth;c.height=v.videoHeight;
  var ctx=c.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(v,0,0,c.width,c.height);
  var r=tryDecode(ctx,c.width,c.height);
  if(r){
    buf.push(r);
    if(buf.length>4)buf.shift();
    if(buf.length>=2&&buf[buf.length-1]===buf[buf.length-2]){
      active=false;onFound(r);return;
    }
  }else{buf=[];}
  requestAnimationFrame(tick);
}

function tryDecode(ctx,w,h){
  if(typeof jsQR==='undefined')return null;
  try{
    var d=ctx.getImageData(0,0,w,h);
    var r=jsQR(d.data,w,h,{inversionAttempts:'attemptBoth'});
    if(r&&r.data&&r.data.trim().length>2)return r.data.trim();
  }catch(e){}
  try{
    var id2=ctx.getImageData(0,0,w,h);
    var px=id2.data;
    for(var i=0;i<px.length;i+=4){
      var g=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];
      var val=g<128?0:255;px[i]=px[i+1]=px[i+2]=val;px[i+3]=255;
    }
    ctx.putImageData(id2,0,0);
    var r2=jsQR(id2.data,w,h,{inversionAttempts:'attemptBoth'});
    if(r2&&r2.data&&r2.data.trim().length>2)return r2.data.trim();
  }catch(e){}
  return null;
}

function onFound(text){
  if(navigator.vibrate)navigator.vibrate([80,40,80]);
  found=text;
  document.getElementById('rcode').textContent=text;
  document.getElementById('res').classList.add('show');
  setTip('✅ تم التعرف','ok');
}

function confirmCode(){
  if(!found)return;
  // Send to opener
  try{window.opener&&window.opener.postMessage({type:'QR_RESULT',code:found},'*');}catch(e){}
  // LocalStorage fallback
  try{localStorage.setItem('c3a_qr',JSON.stringify({code:found,ts:Date.now()}));}catch(e){}
  // If opened as popup close it; if full tab go back
  if(window.opener){closeMe();}
  else if(returnTo){window.location.href=returnTo+'#qr='+encodeURIComponent(found);}
  else{closeMe();}
}

function retry(){
  found=null;buf=[];
  document.getElementById('res').classList.remove('show');
  setTip('وجّه الكاميرا نحو QR Code','');
  active=true;
  requestAnimationFrame(tick);
}

function closeMe(){
  active=false;
  if(raf)cancelAnimationFrame(raf);
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
  if(window.opener)window.close();
  else window.history.back();
}

function setTip(m,c){var el=document.getElementById('tip');if(el){el.textContent=m;el.className='tip '+(c||'');}}

window.addEventListener('beforeunload',function(){
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
});

start();
</script>
</body>
</html>
