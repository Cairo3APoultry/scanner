<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#c0392b">
<title>Cairo 3A — ماسح QR</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0a0e14;color:#fff;font-family:'Cairo','Segoe UI',sans-serif;overflow:hidden;}
  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;}
  #top{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);z-index:5;}
  #top h1{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
  #top .badge{width:30px;height:30px;border-radius:8px;background:#c0392b;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;}
  #closeBtn{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
  #camWrap{flex:1;position:relative;overflow:hidden;background:#000;}
  video{width:100%;height:100%;object-fit:cover;display:block;}
  #frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  #frame .box{width:66vw;max-width:300px;aspect-ratio:1/1;border:3px solid rgba(255,255,255,0.9);border-radius:22px;box-shadow:0 0 0 100vmax rgba(0,0,0,0.45);position:relative;}
  #frame .box::before,#frame .box::after{content:'';position:absolute;left:-3px;right:-3px;height:3px;background:#e74c3c;border-radius:3px;animation:scanline 2.2s ease-in-out infinite;}
  @keyframes scanline{0%,100%{top:0;opacity:0.3}50%{top:100%;opacity:1}}
  #hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,0.85);z-index:4;}
  #bottom{padding:14px 16px;background:rgba(0,0,0,0.5);display:flex;gap:10px;align-items:center;z-index:5;}
  #manualInp{flex:1;padding:12px 14px;border:1.5px solid rgba(255,255,255,0.25);border-radius:12px;background:rgba(255,255,255,0.08);color:#fff;font-family:inherit;font-size:15px;font-weight:700;text-align:center;outline:none;}
  #manualInp::placeholder{color:rgba(255,255,255,0.5);font-weight:400;}
  #sendBtn{background:#16a34a;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
  #torchBtn{background:rgba(255,255,255,0.12);border:none;border-radius:12px;width:46px;height:46px;font-size:20px;cursor:pointer;display:none;}
  #ok{position:fixed;inset:0;background:rgba(22,163,74,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;text-align:center;padding:24px;}
  #ok .ico{font-size:72px;margin-bottom:14px;}
  #ok .code{font-size:26px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:2px;word-break:break-all;}
  #ok .sub{margin-top:8px;font-size:13px;opacity:0.9;}
  #err{position:fixed;inset:0;background:#0a0e14;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40;text-align:center;padding:30px;}
  #err .ico{font-size:60px;margin-bottom:14px;}
  #err .msg{font-size:15px;font-weight:700;margin-bottom:6px;}
  #err .sub{font-size:13px;color:rgba(255,255,255,0.6);max-width:320px;line-height:1.6;}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <h1><span class="badge">3A</span> ماسح الأكواد</h1>
    <button id="closeBtn" onclick="closeMe()">✕ إغلاق</button>
  </div>
  <div id="camWrap">
    <video id="video" playsinline muted></video>
    <div id="frame"><div class="box"></div></div>
    <div id="hint">وجّه الكاميرا نحو كود QR</div>
    <button id="torchBtn" onclick="toggleTorch()" style="position:absolute;top:14px;left:14px;z-index:6;">🔦</button>
  </div>
  <div id="bottom">
    <input id="manualInp" type="text" placeholder="أو اكتب الكود / اللوحة يدوياً" autocomplete="off" autocapitalize="characters"
      onkeydown="if(event.key==='Enter') sendManual()">
    <button id="sendBtn" onclick="sendManual()">إرسال</button>
  </div>
</div>

<div id="ok"><div class="ico">✅</div><div class="code" id="okCode"></div><div class="sub">جارٍ الإرسال للتطبيق…</div></div>

<div id="err">
  <div class="ico">📷</div>
  <div class="msg" id="errMsg">تعذّر فتح الكاميرا</div>
  <div class="sub" id="errSub">تأكد من السماح بالكاميرا للموقع، أو استخدم الإدخال اليدوي في الأسفل.</div>
  <button id="closeBtn2" onclick="document.getElementById('err').style.display='none'" style="margin-top:18px;background:#c0392b;color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:inherit;font-weight:700;cursor:pointer;">حسناً</button>
</div>

<canvas id="cv" hidden></canvas>

<script>
(function(){
  var params    = new URLSearchParams(location.search);
  var returnUrl = params.get('return') || '';
  var video  = document.getElementById('video');
  var canvas = document.getElementById('cv');
  var ctx    = canvas.getContext('2d', { willReadFrequently: true });
  var stream = null, track = null, scanning = true, sent = false, torchOn = false;

  // ── فتح الكاميرا ──
  function startCam() {
    var constraints = { video: { facingMode: { ideal: 'environment' }, width:{ideal:1280}, height:{ideal:720} }, audio:false };
    navigator.mediaDevices.getUserMedia(constraints)
      .then(function(s){
        stream = s;
        track  = s.getVideoTracks()[0];
        video.srcObject = s;
        video.setAttribute('playsinline', true);
        return video.play();
      })
      .then(function(){
        // إظهار زر الفلاش لو مدعوم
        try {
          var caps = track.getCapabilities ? track.getCapabilities() : {};
          if(caps.torch) document.getElementById('torchBtn').style.display = 'block';
        } catch(e){}
        requestAnimationFrame(tick);
      })
      .catch(function(err){
        showError(err && err.name === 'NotAllowedError' ? 'تم رفض إذن الكاميرا' : 'تعذّر فتح الكاميرا');
      });
  }

  // ── حلقة المسح ──
  function tick(){
    if(!scanning) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      var w = video.videoWidth, h = video.videoHeight;
      if(w && h){
        canvas.width = w; canvas.height = h;
        ctx.drawImage(video, 0, 0, w, h);
        var img = ctx.getImageData(0, 0, w, h);
        var code = (typeof jsQR === 'function') ? jsQR(img.data, w, h, { inversionAttempts:'dontInvert' }) : null;
        if(code && code.data){ onResult(code.data); return; }
      }
    }
    requestAnimationFrame(tick);
  }

  // ── عند العثور على كود ──
  function onResult(text){
    text = String(text || '').trim();
    if(sent || text.length < 1) return;
    sent = true; scanning = false;
    try { if(navigator.vibrate) navigator.vibrate(130); } catch(e){}

    // 1) إرسال للنافذة الأصلية (التطبيق)
    try { if(window.opener && !window.opener.closed) window.opener.postMessage({ type:'QR_RESULT', code:text }, '*'); } catch(e){}
    // 2) احتياطي: localStorage (نفس الأصل)
    try { localStorage.setItem('c3a_qr', JSON.stringify({ code:text, ts:Date.now() })); } catch(e){}

    stopCam();
    document.getElementById('okCode').textContent = text;
    document.getElementById('ok').style.display = 'flex';

    setTimeout(function(){
      // لو نافذة منبثقة: التطبيق استلم الكود بالفعل → نقفل
      if(window.opener && !window.opener.closed){
        try { window.close(); } catch(e){}
        // لو المتصفح منع الإغلاق، نرجّع بالـ hash كحل أخير
        if(returnUrl) location.href = returnUrl.split('#')[0] + '#qr=' + encodeURIComponent(text);
      } else if(returnUrl){
        // وضع الجوال (نفس التبويب): نرجّع للتطبيق ومعاه الكود
        location.href = returnUrl.split('#')[0] + '#qr=' + encodeURIComponent(text);
      }
    }, 650);
  }

  // ── إدخال يدوي ──
  window.sendManual = function(){
    var v = (document.getElementById('manualInp').value || '').trim();
    if(v.length < 1) return;
    onResult(v);
  };

  // ── فلاش ──
  window.toggleTorch = function(){
    if(!track) return;
    torchOn = !torchOn;
    try { track.applyConstraints({ advanced: [{ torch: torchOn }] }); } catch(e){}
    document.getElementById('torchBtn').style.opacity = torchOn ? '1' : '0.7';
  };

  // ── إغلاق ──
  window.closeMe = function(){
    stopCam();
    if(window.opener && !window.opener.closed){ try { window.close(); return; } catch(e){} }
    if(returnUrl) location.href = returnUrl.split('#')[0];
    else history.back();
  };

  function stopCam(){
    try { if(stream) stream.getTracks().forEach(function(t){ t.stop(); }); } catch(e){}
  }
  function showError(msg){
    document.getElementById('errMsg').textContent = msg || 'خطأ في الكاميرا';
    document.getElementById('err').style.display = 'flex';
  }

  // إيقاف الكاميرا عند الخروج
  window.addEventListener('pagehide', stopCam);
  window.addEventListener('beforeunload', stopCam);

  startCam();
})();
</script>
</body>
</html>
